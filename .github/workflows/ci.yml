name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown,wasm32v1-none
      - uses: Swatinem/rust-cache@v2
      - name: Run tests
        # .cargo/config.toml defaults to wasm32v1-none; override to the host
        # so tests actually compile and execute on the runner.
        run: |
          cargo test --target "$(rustc -vV | sed -n 's/^host: //p')" -- --nocapture

  build:
    name: Build WASM
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown,wasm32v1-none
      - uses: Swatinem/rust-cache@v2
      - name: Install native build dependencies
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev libudev-dev pkg-config
      - name: Install Stellar CLI
        run: cargo install --locked stellar-cli
      - name: Build contract
        run: stellar contract build
